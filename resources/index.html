<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resources</title>
    <link rel="icon" type="image/png" href="/assets/favicon.png" />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <script defer src="/assets/navbar.js"></script>
    <script defer src="/assets/hide_dev_banners.js"></script>
    <script defer src="/assets/footer.js"></script>
    <style>
        .scroll-backdrop {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            background:
                radial-gradient(circle at 18% 16%, rgba(255, 190, 190, 0.56), transparent 30%),
                radial-gradient(circle at 84% 12%, rgba(176, 191, 255, 0.62), transparent 34%),
                linear-gradient(180deg, #fff8f2 0%, #f1f4ff 54%, #e8eeff 100%);
            opacity: 1;
        }

        .page-main {
            display: flex;
            flex-direction: column;
            gap: 60px;
            padding-top: 28px;
        }

        .page-header {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .page-header h1 {
            font-size: clamp(2.4rem, 5vw, 4rem);
            line-height: 0.98;
            text-shadow: none;
        }

        .page-header p:not(.section-eyebrow) {
            max-width: 760px;
            margin: 12px 0 0;
        }

        .page-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .section-copy {
            max-width: 720px;
            margin: 0;
            font-size: var(--body-copy-size);
            line-height: var(--body-copy-line-height);
            color: var(--body-copy-color);
        }

        .archive-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 20px;
        }

        .archive-card {
            display: flex;
            flex-direction: column;
            gap: 18px;
            height: 100%;
        }

        .archive-title {
            margin: 0;
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.2;
            color: var(--accent-red);
            text-shadow: none;
        }

        .archive-subgrid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .archive-download {
            display: flex;
            flex-direction: column;
            gap: 12px;
            justify-content: space-between;
            align-items: flex-start;
            min-height: 102px;
            padding: 16px 16px 14px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.74);
            border: 1px solid rgba(49, 55, 140, 0.08);
            text-decoration: none;
            transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease;
        }

        .archive-download:hover {
            transform: translateY(-2px);
            border-color: rgba(217, 39, 46, 0.18);
            box-shadow: 0 14px 28px rgba(49, 55, 140, 0.12);
        }

        .archive-download-top {
            display: flex;
            width: 100%;
            align-items: flex-start;
            justify-content: flex-start;
        }

        .archive-download-label {
            margin: 0;
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: #131737;
        }

        .archive-download-icon {
            width: 20px;
            height: 20px;
            flex: 0 0 auto;
            color: var(--accent-blue);
            stroke: currentColor;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
            align-self: flex-end;
        }

        .resource-links {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .resource-action {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 46px;
            padding: 10px 16px;
            border-radius: 999px;
            border: 1px solid rgba(50, 50, 130, 0.14);
            background: rgba(255, 255, 255, 0.84);
            color: rgb(50, 50, 130);
            font-size: 0.95rem;
            font-weight: 700;
            text-decoration: none;
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease, color 0.2s ease;
        }

        .resource-action:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 0, 0, 0.24);
            box-shadow: 0 10px 24px rgba(50, 50, 130, 0.14);
            color: #b00000;
        }

        .resource-action--muted {
            border-color: rgba(49, 55, 140, 0.08);
            background: rgba(246, 248, 255, 0.92);
            color: rgba(49, 55, 140, 0.7);
            cursor: default;
        }

        .resource-action--muted:hover {
            transform: none;
            border-color: rgba(49, 55, 140, 0.08);
            box-shadow: none;
            color: rgba(49, 55, 140, 0.7);
        }

        .section-intro {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        @media (max-width: 820px) {
            .archive-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 560px) {
            .archive-subgrid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 640px) {
            .scroll-backdrop {
                background:
                    radial-gradient(circle at 14% 8%, rgba(255, 196, 196, 0.42), transparent 24%),
                    radial-gradient(circle at 88% 10%, rgba(188, 200, 255, 0.48), transparent 26%),
                    linear-gradient(180deg, #fff8f3 0%, #eff2ff 56%, #e5ecff 100%);
            }

            .page-main {
                gap: 42px;
            }
        }
    </style>
</head>

<body>
    <div class="scroll-backdrop"></div>
    <div id="site-navbar"></div>
    <main class="main-text page-main">
        <section class="page-header">
            <p class="section-eyebrow">Competition Resources</p>
            <h1>Resources</h1>
            <p>
                View competition resources, including archived problem sets, answer keys, and solutions from past
                Lynbrook Math Open competitions.
            </p>
        </section>

        <section class="page-section">
            <div class="section-intro">
                <p class="section-eyebrow">Past Problems</p>
                <p class="section-heading-large">Archive</p>
                <p class="section-copy">
                    Browse the past Lynbrook Math Open test materials here by year.
                </p>
            </div>

            <div class="container">
                <div class="archive-grid">
                <article class="archive-card hover-card">
                    <div class="archive-subgrid">
                        <a class="archive-download" href="https://example.com" target="_blank" rel="noopener noreferrer">
                            <span class="archive-download-top">
                                <span class="archive-download-label">2025 Problems</span>
                            </span>
                            <svg class="archive-download-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                <path d="M12 4v10"></path>
                                <path d="M8 10l4 4 4-4"></path>
                                <path d="M5 19h14"></path>
                            </svg>
                        </a>

                        <a class="archive-download" href="https://example.com" target="_blank" rel="noopener noreferrer">
                            <span class="archive-download-top">
                                <span class="archive-download-label">2025 Solutions</span>
                            </span>
                            <svg class="archive-download-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                <path d="M12 4v10"></path>
                                <path d="M8 10l4 4 4-4"></path>
                                <path d="M5 19h14"></path>
                            </svg>
                        </a>
                    </div>
                </article>
                </div>
            </div>
        </section>
    </main>

    <div id="site-footer"></div>
</body>

</html>
