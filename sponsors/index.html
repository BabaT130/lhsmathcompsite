    <style>
        .sponsors-container {
            background: rgba(0, 0, 0, 0.08);
            border-radius: 20px;
            max-width: 100%;
            margin: 25px auto 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 28px;
            box-sizing: border-box;
            box-shadow: 0 8px 10px rgba(50, 50, 130, 0.4);
        }

        .sponsor-card {
            background-color: rgb(255, 255, 255);
            border-radius: 32px;
            padding: 24px 28px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            align-items: center;
            text-align: left;
        }

        @media (min-width: 640px) {
            .sponsor-card {
                grid-template-columns: minmax(140px, 220px) minmax(0, 1fr);
            }
        }

        .sponsor-card-media {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .sponsor-card-media img {
            width: 100%;
            max-width: 220px;
            height: auto;
            display: block;
            border-radius: 12px;
            object-fit: contain;
        }

        .sponsor-card-body {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 12px;
            min-width: 0;
        }

        .sponsor-card h3 {
            color: #ff0000;
            font-size: 22px;
            font-weight: bold;
            margin: 0;
        }

        .sponsor-tagline {
            color: rgb(50, 50, 130);
            font-size: 15px;
            line-height: 1.35;
            margin: 0;
        }

        .sponsor-card a {
            color: rgb(50, 50, 130);
            font-size: 15px;
            font-weight: 700;
            text-decoration: none;
            border-bottom: 1px solid rgba(50, 50, 130, 0.35);
            padding-bottom: 2px;
        }

        .sponsor-card a:hover {
            color: #ff0000;
            border-bottom-color: rgba(255, 0, 0, 0.45);
        }

        .sponsors-intro {
            font-size: 18px;
            line-height: 1.55;
            margin: 0 0 8px;
            text-align: justify;
        }
    </style>
</head>
