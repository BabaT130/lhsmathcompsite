<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sponsors</title>
    <link rel="icon" type="image/png" href="/assets/favicon.png" />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <script defer src="/navbar.js"></script>
    <script defer src="/hide_dev_banners.js"></script>
    <script defer src="/footer.js"></script>
    <script defer src="/sponsors/sponsors.js"></script>
    <style>
        .sponsors-page {
            display: flex;
            flex-direction: column;
            gap: 24px;
            padding-top: 18px;
        }

        .sponsors-page-header h1 {
            font-size: clamp(2.4rem, 5vw, 4rem);
            line-height: 0.98;
            text-shadow: none;
        }

        .sponsors-page-header p {
            max-width: 760px;
            margin: 12px 0 0;
        }

        .sponsors-shell {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .sponsors-page-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        img.sponsor-logo {
            width: 100%;
        }
    </style>
</head>

<body>
    <div id="site-navbar"></div>
    <main class="main-text sponsors-page">
        <section class="sponsors-page-header">
            <p class="section-eyebrow">About</p>
            <h1>Thank you to our sponsors for supporting LMO.</h1>
            <p>Lynbrook Math Open is grateful for the generous support from the following organizations.</p>
        </section>
        <div class="container sponsors-shell">
            <div id="sponsors-page-grid" class="sponsors-page-grid" data-sponsor-view="detail">
                <p class="sponsor-loading">Loading sponsors...</p>
            </div>
        </div>
    </main>

    <div id="site-footer"></div>
</body>

</html>
