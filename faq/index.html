<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FAQ</title>
    <link rel="icon" type="image/png" href="/assets/favicon.png" />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <script defer src="/assets/navbar.js"></script>
    <script defer src="/assets/hide_dev_banners.js"></script>
    <script defer src="/assets/footer.js"></script>
    <script defer src="./faq.js"></script>
    <style>
        .faq-list {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .faq-loading {
            margin: 0;
            font-size: 0.9375rem;
            line-height: 1.55;
            color: var(--body-copy-color);
        }

        .faq-item {
            border-radius: 20px;
            border: 1px solid rgba(50, 50, 130, 0.1);
            background: linear-gradient(165deg, #ffffff 0%, #f8f9ff 55%, #fff5f5 100%);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
            overflow: hidden;
            transition: border-color 0.28s ease, box-shadow 0.28s ease, transform 0.28s ease;
        }

        .faq-item:hover {
            transform: translateY(-2px);
            border-color: rgba(50, 50, 130, 0.2);
            box-shadow: 0 10px 24px rgba(50, 50, 130, 0.14);
        }

        .faq-item.is-open {
            border-color: rgba(255, 0, 0, 0.16);
            box-shadow: 0 12px 26px rgba(255, 0, 0, 0.12);
        }

        .faq-item summary {
            list-style: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            padding: 16px 18px;
            cursor: pointer;
        }

        .faq-item summary::-webkit-details-marker {
            display: none;
        }

        .faq-question {
            margin: 0;
            color: var(--accent-red);
            font-size: 1rem;
            font-weight: 800;
            line-height: 1.3;
        }

        .faq-icon {
            flex: 0 0 auto;
            width: 32px;
            height: 32px;
            border-radius: 9px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(50, 50, 130, 0.08);
            color: rgb(50, 50, 130);
            transition: background-color 0.28s ease, color 0.28s ease;
        }

        .faq-icon svg {
            display: block;
            width: 14px;
            height: 14px;
            stroke: currentColor;
            stroke-width: 2.2;
            stroke-linecap: round;
            transition: transform 0.28s ease;
        }

        .faq-item.is-open .faq-icon {
            background: rgba(255, 0, 0, 0.1);
            color: #b00000;
        }

        .faq-item.is-open .faq-icon svg {
            transform: rotate(45deg);
        }

        .faq-answer {
            height: 0;
            overflow: hidden;
            transition: height 0.32s ease;
        }

        .faq-answer-inner {
            padding: 0 18px 16px;
            border-top: 1px solid rgba(50, 50, 130, 0.08);
        }

        .faq-answer p {
            margin: 12px 0 0;
        }

        @media (max-width: 820px) {

            .faq-item summary,
            .faq-answer-inner {
                padding-left: 16px;
                padding-right: 16px;
            }
        }
    </style>
</head>

<body>
    <div id="site-navbar"></div>
    <header class="page-title-header">
        <h1 style="margin: 0px" class="page-title-text">FAQ</h1>
    </header>
    <div class="main-text">
        <div class="container">
            <div id="faq-list" class="faq-list">
                <p class="faq-loading">Loading FAQ...</p>
            </div>
        </div>
    </div>
    <div id="site-footer"></div>
</body>

</html>
