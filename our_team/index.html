<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meet Our Team</title>
    <link rel="icon" type="image/png" href="/assets/favicon.png" />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <script defer src="/navbar.js"></script>
    <script defer src="/hide_dev_banners.js"></script>
    <script defer src="/footer.js"></script>
    <script defer src="./team_roles.js"></script>
    <style>
        #team-container {
            --team-column-gap: 28px;
            display: flex;
            align-items: stretch;
            gap: var(--team-column-gap);
        }

        .team-column {
            min-width: 0;
            flex: 1 1 0;
            display: flex;
            flex-direction: column;
            gap: var(--team-column-gap);
        }

        .team-card {
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            text-align: justify;
        }

        .team-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            border-radius: 28px 28px 0 0;
            opacity: 0.95;
        }

        .team-card--stretch {
            flex: 1 1 auto;
        }

        .team-card h3 {
            color: #ff0000;
            font-size: 1.18rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.2;
            margin: 6px 0 10px;
            text-align: center;
        }

        .team-image-stack {
            position: relative;
            width: 72%;
            max-width: 178px;
            aspect-ratio: 1;
            margin: 0 auto 14px;
            padding: 0;
            display: block;
            border: none;
            background: transparent;
            cursor: default;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 4px 14px rgba(50, 50, 130, 0.18);
            transition: box-shadow 0.35s ease;
        }

        .team-image-stack:hover {
            box-shadow: 0 14px 40px rgba(50, 50, 130, 0.32);
        }

        .team-image-stack:focus-visible {
            outline: 2px solid rgb(50, 50, 130);
            outline-offset: 4px;
        }

        .team-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s ease;
        }

        .team-image.is-visible {
            opacity: 1;
        }

        .team-grade {
            display: table;
            margin-left: auto;
            margin-right: auto;
            margin-bottom: 6px;
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 0.76rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            text-align: center;
            color: rgb(50, 50, 130);
            background: rgba(50, 50, 130, 0.09);
            border: 1px solid rgba(50, 50, 130, 0.12);
        }

        .team-roles {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            justify-content: center;
            align-items: center;
            margin-bottom: 8px;
        }

        .team-role-chip {
            appearance: none;
            font-size: 0.64rem;
            font-weight: 600;
            font-family: inherit;
            letter-spacing: 0.03em;
            line-height: 1.3;
            padding: 3px 7px;
            border-radius: 6px;
            border: 1px solid transparent;
            text-align: center;
            cursor: pointer;
            -webkit-user-select: none;
            user-select: none;
            transition: filter 0.15s ease, transform 0.15s ease;
            background: rgba(90, 90, 100, 0.1);
        }

        .team-role-chip:hover {
            filter: brightness(0.97);
        }

        .team-role-chip:active {
            transform: scale(0.98);
        }

        .team-role-modal {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: clamp(16px, 4vw, 32px);
            box-sizing: border-box;
        }

        .team-role-modal[hidden] {
            display: none;
        }

        .team-role-modal-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(20, 20, 40, 0.3);
            border: none;
            padding: 0;
            cursor: default;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .team-role-modal-backdrop.is-visible {
            opacity: 1;
            pointer-events: auto;
        }

        .team-role-modal-panel {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 400px;
            max-height: min(70vh, 420px);
            overflow: auto;
            margin: 0;
            padding: 22px 24px 20px;
            background: linear-gradient(165deg, #ffffff 0%, #f8f9ff 100%);
            border-radius: 16px;
            border: 1px solid rgba(50, 50, 130, 0.14);
            box-shadow: 0 16px 48px rgba(30, 30, 60, 0.28);
            opacity: 1;
            transition: opacity 0.01s linear;
        }

        .team-role-modal-panel.is-closing {
            opacity: 0;
        }

        .team-role-modal-close {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 36px;
            height: 36px;
            margin: 0;
            padding: 0;
            border: none;
            border-radius: 8px;
            background: rgba(50, 50, 130, 0.08);
            color: rgb(50, 50, 130);
            font-size: 1.35rem;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .team-role-modal-close:hover {
            background: rgba(255, 0, 0, 0.12);
            color: #b00000;
        }

        .team-role-modal-title {
            margin: 0 40px 10px 0;
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: rgb(50, 50, 130);
            text-shadow: none;
        }

        .team-role-modal-body {
            margin: 0;
            font-size: 0.9rem;
            line-height: 1.55;
            color: var(--body-copy-color);
        }

        .team-bio {
            font-size: 0.8rem;
            line-height: 1.5;
            letter-spacing: -0.03em;
            color: var(--body-copy-color);
            margin: 0;
        }

        .team-card>.team-bio {
            padding-top: 10px;
            border-top: 1px solid rgba(50, 50, 130, 0.08);
            margin-top: 6px;
        }

        @media (prefers-reduced-motion: reduce) {

            .team-card,
            .team-image-stack,
            .team-role-chip,
            .team-role-modal-backdrop,
            .team-role-modal-close {
                transition: none;
            }

            .team-card:hover {
                transform: none;
            }

            .team-image-stack:hover {
                box-shadow: 0 4px 14px rgba(50, 50, 130, 0.18);
            }

            .team-role-chip:active {
                transform: none;
            }
        }

        @media (max-width: 720px) {
            #team-container {
                flex-direction: column;
            }

            .team-card {
                padding: 22px 20px 20px;
            }
        }
    </style>
</head>

<body>
    <div id="site-navbar"></div>
    <header class="page-title-header">
        <p class="section-eyebrow">About</p>
        <h1 class="page-title-text">Meet Our Team</h1>
        <p>These are the <em>very</em> hard-working members of our team.</p>
    </header>
    <main class="main-text">
        <div id="team-container" class="container">
            <p class="team-bio">Loading team list...</p>
        </div>
    </main>

    <div id="team-role-modal" class="team-role-modal" hidden>
        <button type="button" class="team-role-modal-backdrop"></button>
        <div class="team-role-modal-panel" role="dialog">
            <button type="button" class="team-role-modal-close">&times;</button>
            <h2 id="team-role-modal-title" class="team-role-modal-title"></h2>
            <p class="team-role-modal-body"></p>
        </div>
    </div>

    <div id="site-footer"></div>
</body>

</html>
