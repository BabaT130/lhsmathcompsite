<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meet Our Team</title>
    <link rel="icon" type="image/png" href="/assets/favicon.png" />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <script defer src="/assets/navbar.js"></script>
    <script defer src="/assets/hide_dev_banners.js"></script>
    <script defer src="/assets/footer.js"></script>
    <script defer src="./team_roles.js"></script>
    <style>
        .team-container {
            background: rgba(0, 0, 0, 0.06);
            border-radius: 24px;
            width: calc(100% - 40px);
            max-width: 1240px;
            margin: 25px auto;
            padding: clamp(28px, 4vw, 44px);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: clamp(24px, 3vw, 36px);
            box-sizing: border-box;
            justify-content: center;
            box-shadow: 0 8px 10px rgba(50, 50, 130, 0.4);
            border: 1px solid rgba(50, 50, 130, 0.08);
        }

        .team-card {
            position: relative;
            overflow: hidden;
            background: linear-gradient(165deg, #ffffff 0%, #f8f9ff 55%, #fff5f5 100%);
            border-radius: 28px;
            padding: 28px 28px 26px;
            text-align: justify;
            border: 1px solid rgba(50, 50, 130, 0.1);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
            transition:
                transform 0.3s cubic-bezier(0.22, 1, 0.36, 1),
                box-shadow 0.3s ease,
                border-color 0.3s ease;
        }

        .team-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            border-radius: 28px 28px 0 0;
            opacity: 0.95;
        }

        .team-card:hover {
            transform: translateY(-5px);
            border-color: rgba(50, 50, 130, 0.22);
            box-shadow: 0 4px 10px rgba(255, 0, 0, 0.4);
        }

        .team-card h3 {
            color: #ff0000;
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.2;
            margin: 8px 0 12px;
            text-align: center;
        }

        .team-image-stack {
            width: 80%;
            max-width: 220px;
            margin: 0 auto 18px;
            padding: 0;
            display: block;
            border: none;
            background: transparent;
            cursor: default;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 4px 14px rgba(50, 50, 130, 0.18);
            transition: box-shadow 0.35s ease;
        }

        .team-image-stack:hover {
            box-shadow: 0 14px 40px rgba(50, 50, 130, 0.32);
        }

        .team-image-stack:focus-visible {
            outline: 2px solid rgb(50, 50, 130);
            outline-offset: 4px;
        }

        .team-image {
            width: 100%;
            display: block;
            object-fit: cover;
            aspect-ratio: 1;
        }

        .team-grade {
            display: table;
            margin-left: auto;
            margin-right: auto;
            margin-bottom: 8px;
            padding: 5px 14px;
            border-radius: 999px;
            font-size: 0.8125rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            text-align: center;
            color: rgb(50, 50, 130);
            background: rgba(50, 50, 130, 0.09);
            border: 1px solid rgba(50, 50, 130, 0.12);
        }

        .team-roles {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
        }

        .team-role-chip {
            appearance: none;
            font-size: 0.6875rem;
            font-weight: 600;
            font-family: inherit;
            letter-spacing: 0.03em;
            line-height: 1.3;
            padding: 3px 8px;
            border-radius: 6px;
            border: 1px solid transparent;
            text-align: center;
            cursor: pointer;
            -webkit-user-select: none;
            user-select: none;
            transition: filter 0.15s ease, transform 0.15s ease;
            background: rgba(90, 90, 100, 0.1);
        }

        .team-role-chip:hover {
            filter: brightness(0.97);
        }

        .team-role-chip:active {
            transform: scale(0.98);
        }

        .team-role-modal {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: clamp(16px, 4vw, 32px);
            box-sizing: border-box;
        }

        .team-role-modal[hidden] {
            display: none;
        }

        .team-role-modal-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(20, 20, 40, 0.3);
            border: none;
            padding: 0;
            cursor: default;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .team-role-modal-backdrop.is-visible {
            opacity: 1;
            pointer-events: auto;
        }

        .team-role-modal-panel {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 400px;
            max-height: min(70vh, 420px);
            overflow: auto;
            margin: 0;
            padding: 22px 24px 20px;
            background: linear-gradient(165deg, #ffffff 0%, #f8f9ff 100%);
            border-radius: 16px;
            border: 1px solid rgba(50, 50, 130, 0.14);
            box-shadow: 0 16px 48px rgba(30, 30, 60, 0.28);
            opacity: 1;
            transition: opacity 0.01s linear;
        }

        .team-role-modal-panel.is-closing {
            opacity: 0;
        }

        .team-role-modal-close {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 36px;
            height: 36px;
            margin: 0;
            padding: 0;
            border: none;
            border-radius: 8px;
            background: rgba(50, 50, 130, 0.08);
            color: rgb(50, 50, 130);
            font-size: 1.35rem;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .team-role-modal-close:hover {
            background: rgba(255, 0, 0, 0.12);
            color: #b00000;
        }

        .team-role-modal-title {
            margin: 0 40px 10px 0;
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: rgb(50, 50, 130);
        }

        .team-role-modal-body {
            margin: 0;
            font-size: 0.9375rem;
            line-height: 1.55;
            color: #2a2a2a;
        }

        .team-bio {
            font-size: 0.9375rem;
            line-height: 1.55;
            color: #2a2a2a;
            margin: 0;
        }

        .team-card>.team-bio {
            padding-top: 12px;
            border-top: 1px solid rgba(50, 50, 130, 0.08);
            margin-top: 8px;
        }

        @media (prefers-reduced-motion: reduce) {
            .team-card,
            .team-image-stack,
            .team-role-chip,
            .team-role-modal-backdrop,
            .team-role-modal-close {
                transition: none;
            }

            .team-card:hover {
                transform: none;
            }

            .team-image-stack:hover {
                box-shadow: 0 4px 14px rgba(50, 50, 130, 0.18);
            }

            .team-role-chip:active {
                transform: none;
            }
        }

        @media (max-width: 720px) {
            .team-card {
                padding: 24px 22px 22px;
            }
        }
    </style>
</head>

<body>
    <div id="site-navbar"></div>
    <header class="page-title-header">
        <h1 style="margin: 0px" class="page-title-text">Meet Our Team</h1>
    </header>
    <br>
    <div id="team-container" class="team-container">
        <p class="team-bio">Loading team roster...</p>
    </div>

    <div id="team-role-modal" class="team-role-modal" hidden>
        <button type="button" class="team-role-modal-backdrop" aria-label="Close team role modal"></button>
        <div class="team-role-modal-panel" role="dialog" aria-modal="true" aria-labelledby="team-role-modal-title">
            <button type="button" class="team-role-modal-close" aria-label="Close">&times;</button>
            <h2 id="team-role-modal-title" class="team-role-modal-title"></h2>
            <p class="team-role-modal-body"></p>
        </div>
    </div>

    <div id="site-footer"></div>
</body>

</html>
