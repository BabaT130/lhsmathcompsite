<!DOCTYPE html>
<html lang="en">

<head>
    <base href="/" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <link rel="icon" type="image/png" href="/assets/favicon.png" />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script defer src="assets/navbar.js"></script>
    <script defer src="assets/hide_dev_banners.js"></script>
    <script defer src="assets/footer.js"></script>
    <style>
        .form-card {
            background: #ffffff;
            border-radius: 20px;
            width: 100%;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
        }

        .form-embed {
            width: 100%;
            min-height: 650px;
            border: 0;
            display: block;
        }

        .fallback {
            text-align: center;
            margin-top: 14px;
            color: #000000;
        }
    </style>
</head>

<body>
    <div id="site-navbar"></div>
    <header class="page-title-header">
        <h1 style="margin: 0px" class="page-title-text">Sign Up</h1>
    </header>

    <div class="main-text">
        <div class="form-card">
            <iframe class="form-embed" title="LMAO Sign Up Form"
                src="https://docs.google.com/forms/d/e/1FAIpQLSeCsqvyCrZYCLghh4OBHFldDI5Cteh-e4RP8GoqnzSsPIC90g/viewform?embedded=true"
                loading="lazy">
            </iframe>
        </div><br>
        <div class="form-card">
            <iframe class="form-embed" title="LMAO Team Sign Up Form"
                src="https://docs.google.com/forms/d/e/1FAIpQLSdH9-eCa5d31s90MqW6-1U_ARTBHiUAUnh92Lwbal26ceq7wQ/viewform?embedded=true"
                loading="lazy">
            </iframe>
        </div>
        <!--fallback-->
        <div class="fallback">
            Or alternatively, go to the
            <a class="boldlink"
                href="https://docs.google.com/forms/d/e/1FAIpQLSeCsqvyCrZYCLghh4OBHFldDI5Cteh-e4RP8GoqnzSsPIC90g/viewform"
                target="_blank" rel="noopener noreferrer">individual participation sign-up form</a> or the <a
                class="boldlink"
                href="https://docs.google.com/forms/d/e/1FAIpQLSeCsqvyCrZYCLghh4OBHFldDI5Cteh-e4RP8GoqnzSsPIC90g/viewform"
                target="_blank" rel="noopener noreferrer">team sign-up form</a>.
        </div>
    </div>
    <div id="site-footer"></div>
</body>

</html>
